name: Deploy to Google Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  SERVICE_NAME: keplix-backend
  REGION: asia-south1
  REGISTRY: asia-south1-docker.pkg.dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker asia-south1-docker.pkg.dev

      - name: Build Docker image
        run: |
          docker build \
            -t $REGISTRY/$PROJECT_ID/keplix-backend/$SERVICE_NAME:$GITHUB_SHA \
            -t $REGISTRY/$PROJECT_ID/keplix-backend/$SERVICE_NAME:latest .

      - name: Push Docker image to Artifact Registry
        run: |
          docker push $REGISTRY/$PROJECT_ID/keplix/$SERVICE_NAME:$GITHUB_SHA
          docker push $REGISTRY/$PROJECT_ID/keplix/$SERVICE_NAME:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE_NAME \
            --image $REGISTRY/$PROJECT_ID/keplix/$SERVICE_NAME:$GITHUB_SHA \
            --platform managed \
            --region $REGION \
            --project $PROJECT_ID \
            --port 8080 \
            --set-env-vars="NODE_ENV=production" \
            --set-secrets="\
              DATABASE_URL=DATABASE_URL:latest,\
              JWT_SECRET=JWT_SECRET:latest,\
              JWT_REFRESH_SECRET=JWT_REFRESH_SECRET:latest,\
              ALLOWED_ORIGINS=ALLOWED_ORIGINS:latest,\
              RAZORPAY_KEY_ID=RAZORPAY_KEY_ID:latest,\
              RAZORPAY_KEY_SECRET=RAZORPAY_KEY_SECRET:latest,\
              RAZORPAY_WEBHOOK_SECRET=RAZORPAY_WEBHOOK_SECRET:latest,\
              RAZORPAYX_KEY_ID=RAZORPAYX_KEY_ID:latest,\
              RAZORPAYX_KEY_SECRET=RAZORPAYX_KEY_SECRET:latest,\
              RAZORPAYX_ACCOUNT_NUMBER=RAZORPAYX_ACCOUNT_NUMBER:latest,\
              RAZORPAYX_WEBHOOK_SECRET=RAZORPAYX_WEBHOOK_SECRET:latest,\
              STRIPE_SECRET_KEY=STRIPE_SECRET_KEY:latest,\
              RESEND_API_KEY=RESEND_API_KEY:latest,\
              EMAIL_FROM=EMAIL_FROM:latest,\
              TWILIO_ACCOUNT_SID=TWILIO_ACCOUNT_SID:latest,\
              TWILIO_AUTH_TOKEN=TWILIO_AUTH_TOKEN:latest,\
              TWILIO_PHONE_NUMBER=TWILIO_PHONE_NUMBER:latest,\
              FIREBASE_PROJECT_ID=FIREBASE_PROJECT_ID:latest,\
              CLOUDINARY_URL=CLOUDINARY_URL:latest" \
            --memory 2Gi \
            --cpu 2 \
            --max-instances 10 \
            --min-instances 1 \
            --timeout 600 \
            --cpu-boost \
            --allow-unauthenticated || \
          (echo "Deploy failed — rolling back to last stable revision..." && \
           gcloud run services update-traffic $SERVICE_NAME \
             --to-latest \
             --region $REGION \
             --project $PROJECT_ID && \
           exit 1)

      - name: Show deployment URL
        run: |
          echo "Deployment successful!"
          gcloud run services describe $SERVICE_NAME \
            --region $REGION \
            --project $PROJECT_ID \
            --format 'value(status.url)'